<script type="text/babel">
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(window.Root));

  // Scroll reveal
  const _revealed = new WeakSet();
  let _io;
  function initReveal() {
    if (!("IntersectionObserver" in window)) {
      document.querySelectorAll("[data-reveal]").forEach((el) => el.classList.add("in"));
      return;
    }
    if (!_io) {
      _io = new IntersectionObserver((entries) => {
        entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add("in"); _io.unobserve(e.target); } });
      }, { threshold: 0.06, rootMargin: "0px 0px -4% 0px" });
    }
    document.querySelectorAll("[data-reveal]").forEach((el) => {
      if (!_revealed.has(el)) { _revealed.add(el); _io.observe(el); }
    });
  }
  initReveal();
  setTimeout(initReveal, 80);
  setTimeout(initReveal, 400);
  const _mo = new MutationObserver(() => { clearTimeout(window.__rv); window.__rv = setTimeout(initReveal, 40); });
  _mo.observe(document.getElementById("root"), { childList: true, subtree: true });
  // Safety net
  setTimeout(() => document.querySelectorAll("[data-reveal]:not(.in)").forEach((el) => el.classList.add("in")), 1800);

  // Parallax glow on hero grid
  window.addEventListener("scroll", () => {
    const g = document.querySelector(".hero-grid");
    if (g) g.style.transform = "translateY(" + window.scrollY * 0.1 + "px)";
  }, { passive: true });
</script>
